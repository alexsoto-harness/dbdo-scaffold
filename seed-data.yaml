apiVersion: v1
kind: ConfigMap
metadata:
  name: init-db-schema
  namespace: db-lab
data:
  init.sql: |
    CREATE TABLE users (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        email VARCHAR(150) UNIQUE NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE vendors (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        category VARCHAR(50),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE transactions (
        id SERIAL PRIMARY KEY,
        user_id INTEGER NOT NULL REFERENCES users(id),
        vendor_id INTEGER NOT NULL REFERENCES vendors(id),
        amount DECIMAL(10,2) NOT NULL,
        currency VARCHAR(10) DEFAULT 'USD',
        status VARCHAR(20) DEFAULT 'completed',
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    INSERT INTO users (name, email) VALUES
    ('Alice Johnson', 'alice@example.com'),
    ('Bob Smith', 'bob@example.com'),
    ('Carol Lee', 'carol@example.com');

    INSERT INTO vendors (name, category) VALUES
    ('Acme Corp', 'Retail'),
    ('HealthPlus', 'Healthcare'),
    ('FlyHigh Airlines', 'Travel');

    INSERT INTO transactions (user_id, vendor_id, amount, currency, status) VALUES
    (1, 1, 250.00, 'USD', 'completed'),
    (2, 2, 89.99, 'USD', 'pending'),
    (3, 3, 450.75, 'USD', 'completed'),
    (1, 3, 130.00, 'USD', 'failed');
