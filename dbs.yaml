
# DB1
apiVersion: v1
kind: Service
metadata:
  name: postgres-db1
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app: postgres-db1
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-db1
spec:
  serviceName: "postgres-db1"
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db1
  template:
    metadata:
      labels:
        app: postgres-db1
    spec:
      initContainers:
        - name: init-schema
          image: postgres:latest
          command: ["sh", "-c", "until pg_isready -h localhost -U admin; do sleep 2; done && psql -U admin -d mydb -f /docker-entrypoint-initdb.d/init.sql"]
          env:
            - name: PGPASSWORD
              value: "secretpass"
          volumeMounts:
            - name: init-db
              mountPath: /docker-entrypoint-initdb.d
      containers:
        - name: postgres
          image: postgres:latest
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_PASSWORD
              value: "secretpass"
            - name: POSTGRES_DB
              value: "mydb"
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: init-db
          configMap:
            name: init-db-schema
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
