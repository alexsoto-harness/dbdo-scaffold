############################
# POSTGRES-DB1
############################
apiVersion: v1
kind: Service
metadata:
  name: postgres-db1
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app: postgres-db1
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-db1
spec:
  serviceName: "postgres-db1"
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db1
  template:
    metadata:
      labels:
        app: postgres-db1
    spec:
      containers:
        - name: postgres
          image: postgres:16.10
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_PASSWORD
              value: "secretpass"
            - name: POSTGRES_DB
              value: "mydb"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: init-schema-db1
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init-schema
          image: postgres:16.10
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres-db1 -U admin; do sleep 2; done &&
              psql -h postgres-db1 -U admin -d mydb -f /docker-entrypoint-initdb.d/init.sql
          env:
            - name: PGPASSWORD
              value: "secretpass"
          volumeMounts:
            - name: init-db
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-db
          configMap:
            name: init-db-schema

